version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cowork
      POSTGRES_USER: cowork
      POSTGRES_PASSWORD: cowork_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8888:8888"
    environment:
      - PORT=8888
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Database=cowork;Username=cowork;Password=cowork_dev
    depends_on:
      - db

  claude-bridge:
    build: ./tools/claude-bridge
    ports:
      - "127.0.0.1:8889:8889"
    environment:
      COWORK_BACKEND_URL: "http://backend:8888"
      PORT: "8889"
      DEBOUNCE_MS: "500"
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
