function mkBeam(a1,a2,dur,color){

function runOrder(order){
  var ceo=M["ceo"],dir=M[order.dir];if(!ceo||!dir)return;
  // Check everyone is idle
  var allIds=["ceo",order.dir].concat(order.tasks.map(function(t){return t.w}));
  for(var i=0;i<allIds.length;i++){if(sts[allIds[i]]!=="idle"||M[allIds[i]].wt)return}
  var dirAgent=AG.find(function(x){return x.id===order.dir});
  var totalDur=6000+order.tasks.length*4000+5000;
  mtgs.push({ids:allIds,end:Date.now()+totalDur});

  // ═══ PHASE 1: CEO walks to Director ═══
  addEv("👑","CEO talimat veriyor: \""+order.ceo+"\"");
  setSt("ceo","commanding");
  showB(ceo.bub,order.ceo,3);
  logs["ceo"].push("📢 "+order.ceo);
  // CEO walks toward director
  var meetX=(0+dirAgent.x)/2,meetZ=(-14+dirAgent.z)/2;
  walkTo("ceo",meetX,meetZ);
  walkTo(order.dir,meetX,meetZ+1);
  setSt(order.dir,"talking");
  mkBeam("ceo",order.dir,6000,0xfbbf24);

  // After CEO arrives, conversation
  setTimeout(function(){
    showB(ceo.bub,order.ceo,2.5);
    addEv("👑→"+dirAgent.e,"\""+order.ceo+"\"");
    logs[order.dir].push("👑 CEO: "+order.ceo);
    if(selId===order.dir)updDP();
  },2000);

  setTimeout(function(){
    showB(dir.bub,"Anlaşıldı, hemen organize ediyorum",2.5);
    addEv(dirAgent.e,"\"Anlaşıldı, organize ediyorum\"");
    logs[order.dir].push("✅ Kabul edildi");
  },4500);

  // CEO goes home
  setTimeout(function(){
    goHome("ceo");setSt("ceo","idle");
  },6000);

  // ═══ PHASE 2: Director delegates to Workers ═══
  setTimeout(function(){
    goHome(order.dir);
    addEv(dirAgent.e,"Ekibe görev dağıtıyor: \""+order.dirMsg+"\"");
    showB(dir.bub,order.dirMsg,3);
    logs[order.dir].push("📢 Ekibe: "+order.dirMsg);
    if(selId===order.dir)updDP();

    // Director walks to each worker sequentially
    order.tasks.forEach(function(task,idx){
      var worker=AG.find(function(x){return x.id===task.w});
      var wm=M[task.w];if(!worker||!wm)return;
      var delay=2000+idx*4000;

      setTimeout(function(){
        // Director walks to worker
        setSt(order.dir,"commanding");
        walkTo(order.dir,worker.x+(idx%2?0.8:-0.8),worker.z);
        mkBeam(order.dir,task.w,3500,dirAgent.c);
      },delay);

      setTimeout(function(){
        // Director gives order
        showB(dir.bub,"→ "+worker.e+" "+task.m,2.5);
        addEv(dirAgent.e+"→"+worker.e,"\""+task.m+"\"");
        logs[task.w].push(dirAgent.e+" Müdür: "+task.m);
        if(selId===task.w)updDP();
      },delay+1200);

      setTimeout(function(){
        // Worker acknowledges and starts working
        setSt(task.w,"working");
        showB(wm.bub,"Tamam, başlıyorum!",2);
        addEv(worker.e,"\"Tamam, başlıyorum!\"");
        logs[task.w].push("▶ Çalışıyor: "+task.m);
        if(selId===task.w)updDP();
        goHome(order.dir);
        setSt(order.dir,"idle");
      },delay+3000);

      // Worker finishes
      setTimeout(function(){
        setSt(task.w,"idle");
        showB(wm.bub,"✅ Tamamlandı",2);
        addEv("✅",worker.e+" "+worker.n+" tamamladı: "+task.m.slice(0,25));
        logs[task.w].push("✅ Tamamlandı");
        if(selId===task.w)updDP();
      },delay+3000+4000+Math.random()*2000);
    });

    // Director goes home after all delegations
    setTimeout(function(){
      goHome(order.dir);setSt(order.dir,"idle");
    },2000+order.tasks.length*4000);
  },7000);
}

    setSt(a.id,st);addEv(st==="thinking"?"🧠":"⚡",a.e+" "+a.n+" → "+st);logs[a.id].push("[AUTO] "+st);if(selId===a.id)updDP();

    setTimeout(function(){if(sts[a.id]!=="idle"&&sts[a.id]!=="talking"&&sts[a.id]!=="commanding"){setSt(a.id,"idle");logs[a.id].push("[AUTO] idle");if(selId===a.id)updDP()}},3000+Math.random()*4000)}}
  // CEO COMMAND CHAIN (main event!)
  if(Date.now()-lastOrderTime>15000&&Math.random()<0.5&&mtgs.length===0){
    lastOrderTime=Date.now();
    var order=ORDERS[Math.floor(Math.random()*ORDERS.length)];
    runOrder(order)}
  // Cross-dept sync beams
  if(Math.random()<0.08){var b1=AG[Math.floor(Math.random()*AG.length)],b2=AG[Math.floor(Math.random()*AG.length)];
    if(b1.id!==b2.id&&b1.dp!==b2.dp){mkBeam(b1.id,b2.id,3000);addEv("📡",b1.e+"→"+b2.e+" sync")}}
},3000);
</script>
